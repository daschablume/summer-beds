<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summer Beds Booking</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☀️</text></svg>">
    <meta name="description" content="Book your summer bed for Week 26, 27, and 28!">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <!-- Feather Icons -->
    <script src="https://unpkg.com/feather-icons"></script>
</head>

<body>
    <div id="app">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <div class="logo">
                    <i data-feather="sun" class="sun-icon"></i>
                    <h1>Summer Beds</h1>
                </div>
                <p class="subtitle">Book your stay for the best weeks of the summer.</p>
            </div>
        </header>

        <!-- Multi-Select Toolbar -->
        <div id="multi-select-toolbar" class="multi-select-toolbar">
            <div class="toolbar-content" id="toolbar-default">
                <button id="btn-enable-multi" class="btn-action">
                    <i data-feather="check-square"></i>
                    <span>Select Multiple Beds</span>
                </button>
            </div>
            <div class="toolbar-content hidden" id="toolbar-active">
                <div class="selection-info">
                    <i data-feather="layers" class="toolbar-icon"></i>
                    <span id="multi-select-count">0 beds selected</span>
                </div>
                <div class="toolbar-actions">
                    <button id="btn-cancel-multi" class="btn-secondary">Cancel</button>
                    <button id="btn-book-multi" class="btn-primary" disabled>Book Selected</button>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <main class="calendar-container" id="calendar-container">
            <!-- Weeks will be rendered here via JS -->
        </main>

        <!-- Booking Modal -->
        <div class="modal-overlay" id="booking-modal">
            <div class="modal-content">
                <button class="close-modal" id="close-modal" aria-label="Close modal">
                    <i data-feather="x"></i>
                </button>
                <div class="modal-header">
                    <i data-feather="calendar" class="modal-icon"></i>
                    <h2 id="modal-title">Book a Bed</h2>
                    <p id="modal-date">Date goes here</p>
                </div>
                <form id="booking-form">
                    <div class="input-group">
                        <label for="booker-name">Your Name</label>
                        <input type="text" id="booker-name" placeholder="E.g., Alex Johnson" required
                            autocomplete="off">
                    </div>
                    <input type="hidden" id="booking-day-id">
                    <input type="hidden" id="booking-slot-idx">
                    <button type="submit" class="btn-primary">Confirm Booking</button>
                </form>
            </div>
        </div>

        <!-- Cancellation Modal -->
        <div class="modal-overlay" id="cancel-modal">
            <div class="modal-content">
                <button class="close-modal" id="close-cancel-modal" aria-label="Close modal">
                    <i data-feather="x"></i>
                </button>
                <div class="modal-header header-danger">
                    <i data-feather="alert-circle" class="modal-icon"></i>
                    <h2>Cancel Booking</h2>
                    <p>Are you sure you want to remove <strong id="cancel-name"></strong> from this bed on <strong
                            id="cancel-date-text"></strong>?</p>
                </div>
                <form id="cancel-form">
                    <input type="hidden" id="cancel-day-id">
                    <input type="hidden" id="cancel-slot-idx">
                    <button type="submit" class="btn-danger">Yes, Remove Booking</button>
                    <button type="button" class="btn-secondary" id="btn-keep-booking">No, Keep It</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast-container"></div>
    <!-- Firebase (Compat versions work locally without a server!) -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-database-compat.js"></script>

    <script src="app.js" type="module"></script>
    <script>
        feather.replace();
    </script>
</body>

</html>
